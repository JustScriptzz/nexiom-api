<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexiom — one endpoint, always answering</title>
<meta name="description" content="Nexiom is a single AI inference endpoint that keeps answering, request after request.">
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grain"></div>

<header class="nav">
  <div class="nav-inner">
    <a class="brand" href="#/" data-nav>
      <img src="logo.png" alt="Nexiom" class="brand-mark">
      <span class="brand-name">Nexiom</span>
    </a>
    <nav class="nav-links" id="navLinks">
      <a href="#/" data-nav>Home</a>
      <a href="#/models" data-nav>Models</a>
      <a href="#/docs" data-nav>Docs</a>
      <a href="#/dashboard" data-nav class="nav-authed hidden" id="navDash">Dashboard</a>
      <a href="#/keys" data-nav class="nav-authed hidden" id="navKeys">Keys</a>
      <a href="#/chat" data-nav class="nav-authed hidden" id="navChat">Chat</a>
      <a href="#/login" data-nav class="nav-auth" id="navAuth">Log in</a>
    </nav>
  </div>
</header>

<main id="app"></main>

<footer class="footer">
  <img src="logo.png" alt="Nexiom" class="footer-mark">
  <span>Nexiom</span>
  <span class="footer-dot">·</span>
  <span>a small, resilient AI endpoint</span>
</footer>

<script type="text/template" id="tmpl-home">
  <section class="hero">
    <div class="hero-bg" aria-hidden="true"></div>
    <div class="hero-inner">
      <p class="eyebrow">AI inference · one endpoint</p>
      <h1>Ask it anything.<br>It answers <em>every</em> time.</h1>
      <p class="hero-sub">Nexiom is a single API endpoint in front of a resilient chain of inference paths. If one is busy, your request quietly moves to the next. Your code never has to know.</p>
      <div class="hero-actions">
        <a href="#/docs" class="btn btn-primary">Read the docs</a>
        <a href="#/signup" class="btn btn-ghost">Create an account</a>
      </div>
      <div class="console" role="img" aria-label="Terminal showing an example Nexiom API request and response">
        <div class="console-bar">
          <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
          <span class="console-title">request.sh</span>
        </div>
        <pre class="console-body"><code><span class="c-muted">$</span> curl https://nexiom.dev/api/v1/chat/completions \
    -H <span class="c-str">"Authorization: Bearer $NEXIOM_KEY"</span> \
    -d <span class="c-str">'{ "messages": [{"role":"user","content":"still there?"}] }'</span>

<span class="c-muted" id="typedResponse"></span><span class="cursor">▍</span></code></pre>
      </div>
    </div>
  </section>

  <section class="how" id="how">
    <p class="eyebrow eyebrow-center">Every request, start to finish</p>
    <h2>What happens between your call and your answer</h2>
    <div class="steps">
      <div class="step">
        <span class="step-num">01</span>
        <h3>You send one request</h3>
        <p>One base URL, one key, the same request body you'd send to any chat completions endpoint.</p>
      </div>
      <div class="step">
        <span class="step-num">02</span>
        <h3>Nexiom finds a healthy path</h3>
        <p>Behind the scenes, Nexiom holds open several independent inference paths and finds the fastest one.</p>
      </div>
      <div class="step">
        <span class="step-num">03</span>
        <h3>You get an answer, not an error</h3>
        <p>If a path is throttled or down, Nexiom re-routes before it ever reaches your code.</p>
      </div>
    </div>
  </section>
</script>

<script type="text/template" id="tmpl-models">
  <section class="page-section">
    <div class="page-card">
      <p class="eyebrow eyebrow-center">Available Models</p>
      <h2>All models</h2>
      <p class="text-muted" style="margin-bottom:24px">Default models are highlighted.</p>
      <div id="modelsList" class="models-grid">
        <p class="text-muted">Loading models...</p>
      </div>
    </div>
  </section>
</script>

<script type="text/template" id="tmpl-docs">
  <section class="page-section">
    <div class="page-card docs-card">
      <p class="eyebrow eyebrow-center">Documentation</p>
      <h2>API Reference</h2>

      <div class="docs-section">
        <h3>Base URL</h3>
        <pre class="code-block"><code>https://nexiom.dev/api/v1</code></pre>
      </div>

      <div class="docs-section">
        <h3>Authentication</h3>
        <p>Include your API key in the <code>Authorization</code> header:</p>
        <pre class="code-block"><code>Authorization: Bearer &lt;your-api-key&gt;</code></pre>
        <p>Sign up for an account to generate your own API key.</p>
      </div>

      <div class="docs-section">
        <h3>Chat Completions</h3>
        <p><code>POST /api/v1/chat/completions</code></p>
        <pre class="code-block"><code>curl https://nexiom.dev/api/v1/chat/completions \
  -H "Content-Type: application/json" \
  -H "Authorization: Bearer $NEXIOM_KEY" \
  -d '{
    "messages": [
      { "role": "user", "content": "Hello!" }
    ]
  }'</code></pre>
      </div>

      <div class="docs-section">
        <h3>Available Models</h3>
        <p>Check the <a href="#/models" data-nav>Models</a> page for the currently available inference models.</p>
      </div>

      <div class="tabs" id="codeTabs">
        <button class="tab active" data-tab="curl">curl</button>
        <button class="tab" data-tab="js">JavaScript</button>
        <button class="tab" data-tab="py">Python</button>
      </div>
      <pre class="code-block" data-panel="curl"><code>curl https://nexiom.dev/api/v1/chat/completions \
  -H "Content-Type: application/json" \
  -H "Authorization: Bearer $NEXIOM_KEY" \
  -d '{
    "messages": [
      { "role": "user", "content": "Explain Nexiom in one line." }
    ]
  }'</code></pre>
      <pre class="code-block hidden" data-panel="js"><code>const res = await fetch("https://nexiom.dev/api/v1/chat/completions", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${process.env.NEXIOM_KEY}`
  },
  body: JSON.stringify({
    messages: [{ role: "user", content: "Explain Nexiom in one line." }]
  })
});
const data = await res.json();
console.log(data.choices[0].message.content);</code></pre>
      <pre class="code-block hidden" data-panel="py"><code>import os, requests
res = requests.post(
    "https://nexiom.dev/api/v1/chat/completions",
    headers={"Authorization": f"Bearer {os.environ['NEXIOM_KEY']}"},
    json={"messages": [{"role": "user", "content": "Explain Nexiom in one line."}]},
)
print(res.json()["choices"][0]["message"]["content"])</code></pre>
    </div>
  </section>
</script>

<script type="text/template" id="tmpl-login">
  <section class="page-section">
    <div class="auth-card">
      <p class="eyebrow eyebrow-center">Welcome back</p>
      <h2>Log in to your account</h2>
      <form id="loginForm" class="auth-form">
        <label class="auth-label">
          Email
          <input type="email" class="auth-input" id="loginEmail" required placeholder="you@example.com">
        </label>
        <label class="auth-label">
          Password
          <input type="password" class="auth-input" id="loginPassword" required placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
        </label>
        <p class="auth-error" id="loginError"></p>
        <button type="submit" class="btn btn-primary auth-btn">Log in</button>
      </form>
      <p class="auth-alt">Don't have an account? <a href="#/signup" data-nav>Sign up</a></p>
    </div>
  </section>
</script>

<script type="text/template" id="tmpl-signup">
  <section class="page-section">
    <div class="auth-card">
      <p class="eyebrow eyebrow-center">Get started</p>
      <h2>Create your account</h2>
      <form id="signupForm" class="auth-form">
        <label class="auth-label">
          Email
          <input type="email" class="auth-input" id="signupEmail" required placeholder="you@example.com">
        </label>
        <label class="auth-label">
          Password
          <input type="password" class="auth-input" id="signupPassword" required minlength="6" placeholder="At least 6 characters">
        </label>
        <p class="auth-error" id="signupError"></p>
        <button type="submit" class="btn btn-primary auth-btn">Create account</button>
      </form>
      <p class="auth-alt">Already have an account? <a href="#/login" data-nav>Log in</a></p>
    </div>
  </section>
</script>

<script type="text/template" id="tmpl-dashboard">
  <section class="page-section">
    <div class="page-card dashboard-card">
      <p class="eyebrow eyebrow-center">Dashboard</p>
      <h2>Welcome back</h2>
      <div id="dashboardContent"></div>
    </div>
  </section>
</script>

<script type="text/template" id="tmpl-keys">
  <section class="page-section">
    <div class="page-card dashboard-card">
      <p class="eyebrow eyebrow-center">Dashboard</p>
      <h2>Manage API Keys</h2>
      <div class="key-section">
        <p class="text-muted">Create and manage API keys. Each key can be labeled, enabled/disabled, and restricted to specific models.</p>
        <div class="key-list" id="keyList"></div>
        <button class="btn btn-primary" id="genKeyBtn" style="margin-top:16px">+ Generate New Key</button>
        <p class="auth-success hidden" id="keyMessage" style="margin-top:12px"></p>
      </div>
    </div>
  </section>
</script>

<script type="text/template" id="tmpl-chat">
  <div class="chat-page">
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg chat-msg-assistant">
        <div class="chat-msg-content">Welcome to Nexiom Chat! Send a message to get started.</div>
      </div>
    </div>
    <div class="chat-bottom">
      <div class="chat-toolbar" id="chatToolbar">
        <label class="ct-label ct-label-model">
          Model
          <div class="ct-combo" id="chatModelCombo">
            <button type="button" class="ct-combo-trigger" id="chatModelTrigger">Auto</button>
            <div class="ct-combo-dropdown" id="chatModelDropdown">
              <input type="text" class="ct-combo-search" id="chatModelSearch" placeholder="Search models..." autocomplete="off">
              <div class="ct-combo-options" id="chatModelOptions"></div>
            </div>
            <select class="ct-select-ghost" id="chatModel"></select>
          </div>
        </label>
        <label class="ct-label ct-label-sm">
          Temp
          <input type="range" class="ct-range" id="chatTemp" min="0" max="2" step="0.1" value="0.7">
          <span class="ct-range-val" id="chatTempVal">0.7</span>
        </label>
        <label class="ct-label ct-label-sm">
          Max
          <input type="number" class="ct-input" id="chatMaxTokens" value="1024" min="1" max="65536">
        </label>
        <button class="ct-toggle" id="chatToolbarToggle" title="Toggle settings">&#x2699;</button>
      </div>
      <form class="chat-form" id="chatForm">
        <textarea class="chat-form-input" id="chatInput" rows="1" placeholder="Message Nexiom..." required></textarea>
        <button type="submit" class="chat-form-btn" id="chatSend">Send</button>
      </form>
      <p class="chat-footnote">Models may return inaccurate information. Responses come from third-party providers.</p>
    </div>
  </div>
</script>

<script src="script.js"></script>
</body>
</html>
